<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krishna Awasthi | Portfolio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1 id="name">Portfolio</h1>
        <p id="title"></p>
      </div>
      <a class="btn" href="/login">Admin Login</a>
    </header>

    <main class="container">
      <section class="card hero">
        <div>
          <h2>About</h2>
          <p id="about"></p>
          <p><strong>Location:</strong> <span id="location"></span></p>
          <p><strong>Email:</strong> <a id="email" href="#"></a></p>
          <p><strong>Phone:</strong> <span id="phone"></span></p>
          <a class="btn" id="resume" target="_blank" rel="noreferrer">View Resume</a>
          <div class="links" id="links"></div>
        </div>
      </section>

      <section class="card">
        <h2>Photo Slider</h2>
        <div class="slider" id="slider"></div>
      </section>

      <section class="card">
        <h2>Skills</h2>
        <ul id="skills" class="chips"></ul>
      </section>

      <section class="card">
        <h2>Experience</h2>
        <div id="experience"></div>
      </section>

      <section class="card">
        <h2>Projects</h2>
        <div id="projects"></div>
      </section>

      <section class="card">
        <h2>Certificates</h2>
        <ul id="certificates"></ul>
      </section>

      <section class="card">
        <h2>Achievements</h2>
        <ul id="achievements"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
