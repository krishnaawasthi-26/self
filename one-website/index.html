<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krishna Portfolio - All in One</title>
  <style>
    :root { --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#94a3b8; --accent:#38bdf8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Inter,system-ui,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1000px; margin:0 auto; padding:16px; }
    .card { background:var(--card); border:1px solid #1f2937; border-radius:14px; padding:14px; margin-bottom:14px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .between { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .btn { border:0; border-radius:8px; padding:8px 12px; font-weight:700; cursor:pointer; background:var(--accent); color:#081119; text-decoration:none; }
    .btn.s { background:#334155; color:#fff; }
    input, textarea, select { width:100%; background:#0b1220; color:#f8fafc; border:1px solid #334155; border-radius:8px; padding:8px; margin-top:6px; margin-bottom:8px; }
    .hidden { display:none; }
    .chip { background:#1e293b; border-radius:999px; padding:5px 10px; display:inline-block; margin:3px; }
    .slider img { width:100%; height:320px; object-fit:cover; border-radius:10px; }
    .muted { color:var(--muted); }
    .grid2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
    .item { border:1px solid #334155; border-radius:10px; padding:10px; margin-bottom:8px; }
    code { background:#1e293b; padding:1px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="between card">
      <div>
        <h1 id="name"></h1>
        <p id="title" class="muted"></p>
      </div>
      <div class="row">
        <a class="btn s" id="resumeBtn" target="_blank" rel="noreferrer">Resume</a>
        <button class="btn" id="openAdmin">Admin</button>
      </div>
    </div>

    <section class="card">
      <h2>About</h2>
      <p id="about"></p>
      <p><strong>Location:</strong> <span id="location"></span></p>
      <p><strong>Email:</strong> <a id="email" href="#"></a> | <strong>Phone:</strong> <span id="phone"></span></p>
      <div id="links"></div>
    </section>

    <section class="card">
      <h2>Photos</h2>
      <div class="slider" id="slider"></div>
    </section>

    <section class="card"><h2>Skills</h2><div id="skills"></div></section>
    <section class="card"><h2>Experience</h2><div id="experiences"></div></section>
    <section class="card"><h2>Projects</h2><div id="projects"></div></section>
    <section class="card"><h2>Certificates</h2><ul id="certs"></ul></section>
    <section class="card"><h2>Achievements</h2><ul id="achievements"></ul></section>

    <section class="card hidden" id="adminPanel">
      <div class="between">
        <h2>Admin Panel</h2>
        <button class="btn s" id="closeAdmin">Close</button>
      </div>

      <div id="loginBox">
        <p>Login with <code>me</code> / <code>123</code></p>
        <input id="username" placeholder="username" />
        <input id="password" type="password" placeholder="password" />
        <button class="btn" id="loginBtn">Login</button>
        <p id="loginMsg" class="muted"></p>
      </div>

      <div id="editorBox" class="hidden">
        <div class="row">
          <button class="btn s" id="downloadJson">Download JSON</button>
          <label class="btn s" style="display:inline-block;cursor:pointer;">Upload JSON<input id="uploadJson" type="file" accept="application/json" class="hidden" /></label>
        </div>

        <h3>Quick Add</h3>
        <div class="grid2">
          <div class="item">
            <h4>Add Photo</h4>
            <input id="newPhotoUrl" placeholder="Photo URL" />
            <input id="newPhotoCaption" placeholder="Caption" />
            <button class="btn" id="addPhoto">Add</button>
          </div>
          <div class="item">
            <h4>Add Certificate</h4>
            <input id="newCertName" placeholder="Name" />
            <input id="newCertIssuer" placeholder="Issuer" />
            <input id="newCertUrl" placeholder="URL" />
            <button class="btn" id="addCert">Add</button>
          </div>
          <div class="item">
            <h4>Add Link</h4>
            <input id="newLinkLabel" placeholder="Label" />
            <input id="newLinkUrl" placeholder="URL" />
            <button class="btn" id="addLink">Add</button>
          </div>
        </div>

        <h3>Full Content Editor (Everything)</h3>
        <textarea id="jsonEditor" rows="18"></textarea>
        <div class="row">
          <button class="btn" id="saveBtn">Save</button>
          <button class="btn s" id="resetBtn">Reset to Default</button>
          <span id="saveMsg" class="muted"></span>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'krishna_portfolio_all_in_one';
    const ADMIN_KEY = 'krishna_admin_logged';
    const seed = {
      name: 'Krishna Awasthi',
      title: 'Backend & IoT Engineer',
      location: 'Jaipur, Rajasthan',
      email: 'krishna.Awasthi.CSE@gmail.com',
      phone: '+91 9649722470',
      resumeUrl: '#',
      about: 'I build real-time backend and IoT systems with strong focus on APIs, reliability, and performance.',
      links: [
        { label: 'LinkedIn', url: 'https://www.linkedin.com/in/krishnaawasthi/' },
        { label: 'GitHub', url: 'https://github.com/krishnaawasthi_26' },
        { label: 'Codolio', url: 'https://codolio.com/profile/KrishnaAwasthi_26' }
      ],
      photos: [
        { url: 'https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1200&q=80', caption: 'Building projects' },
        { url: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&q=80', caption: 'IoT engineering' }
      ],
      skills: ['Python','FastAPI','MongoDB','MQTT','Java','Spring Boot','MySQL','REST API'],
      experiences: [
        { company: 'Swami Keshvanand Institute of Technology', role: 'Backend & IoT Engineering Intern', duration: 'Jul 2025 - Aug 2025', points: ['Built 12+ FastAPI endpoints for sensor ingestion.', 'Reduced latency from 400ms to 200ms.'] }
      ],
      projects: [
        { name: 'LeetCode Tracker', stack: 'FastAPI, MongoDB', description: 'Analytics dashboard for coding progress', github: 'https://github.com/krishnaawasthi-26/backend-leetcode-tracker.git', demo: 'https://backend-leetcode-tracker--krishnaasfafav.replit.app/' }
      ],
      certificates: [
        { name: 'Programming in Java', issuer: 'IIT Kharagpur (NPTEL)', url: 'https://archive.nptel.ac.in/noc/Ecertificate/?q=NPTEL25CS57S114740173504421650' }
      ],
      achievements: ['Knight on LeetCode (1958 rating)', '1300+ DSA problems solved']
    };

    let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || JSON.stringify(seed));
    let slide = 0;

    const $ = (id) => document.getElementById(id);

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      $('jsonEditor').value = JSON.stringify(data, null, 2);
    }

    function renderSlider() {
      const root = $('slider');
      if (!data.photos.length) {
        root.innerHTML = '<p class="muted">No photos. Add from admin panel.</p>';
        return;
      }
      const p = data.photos[slide % data.photos.length];
      root.innerHTML = `
        <img src="${p.url}" alt="${p.caption || 'photo'}">
        <p>${p.caption || ''}</p>
        <div class="row"><button class="btn s" id="prev">Prev</button><button class="btn s" id="next">Next</button></div>
      `;
      $('prev').onclick = () => { slide = (slide - 1 + data.photos.length) % data.photos.length; renderSlider(); };
      $('next').onclick = () => { slide = (slide + 1) % data.photos.length; renderSlider(); };
    }

    function render() {
      $('name').textContent = data.name;
      $('title').textContent = data.title;
      $('resumeBtn').href = data.resumeUrl || '#';
      $('about').textContent = data.about || '';
      $('location').textContent = data.location || '';
      $('email').textContent = data.email || '';
      $('email').href = `mailto:${data.email || ''}`;
      $('phone').textContent = data.phone || '';
      $('links').innerHTML = (data.links||[]).map(x => `<a class="btn s" href="${x.url}" target="_blank" rel="noreferrer">${x.label}</a>`).join(' ');

      $('skills').innerHTML = (data.skills||[]).map(x => `<span class="chip">${x}</span>`).join(' ');
      $('experiences').innerHTML = (data.experiences||[]).map(e => `<div class='item'><h3>${e.role} @ ${e.company}</h3><p class='muted'>${e.duration}</p><ul>${(e.points||[]).map(p=>`<li>${p}</li>`).join('')}</ul></div>`).join('');
      $('projects').innerHTML = (data.projects||[]).map(p => `<div class='item'><h3>${p.name}</h3><p class='muted'>${p.stack}</p><p>${p.description}</p><a href='${p.github||'#'}' target='_blank'>GitHub</a>${p.demo?` | <a href='${p.demo}' target='_blank'>Demo</a>`:''}</div>`).join('');
      $('certs').innerHTML = (data.certificates||[]).map(c => `<li><a href='${c.url}' target='_blank'>${c.name}</a> - ${c.issuer}</li>`).join('');
      $('achievements').innerHTML = (data.achievements||[]).map(a => `<li>${a}</li>`).join('');

      renderSlider();
      $('jsonEditor').value = JSON.stringify(data, null, 2);
    }

    $('openAdmin').onclick = () => $('adminPanel').classList.remove('hidden');
    $('closeAdmin').onclick = () => $('adminPanel').classList.add('hidden');

    function showEditorIfLogged() {
      const logged = localStorage.getItem(ADMIN_KEY) === 'yes';
      $('loginBox').classList.toggle('hidden', logged);
      $('editorBox').classList.toggle('hidden', !logged);
    }

    $('loginBtn').onclick = () => {
      if ($('username').value === 'me' && $('password').value === '123') {
        localStorage.setItem(ADMIN_KEY, 'yes');
        $('loginMsg').textContent = 'Login success';
        showEditorIfLogged();
      } else {
        $('loginMsg').textContent = 'Invalid credentials';
      }
    };

    $('saveBtn').onclick = () => {
      try {
        data = JSON.parse($('jsonEditor').value);
        saveLocal();
        render();
        $('saveMsg').textContent = 'Saved';
      } catch {
        $('saveMsg').textContent = 'Invalid JSON';
      }
    };

    $('resetBtn').onclick = () => {
      data = JSON.parse(JSON.stringify(seed));
      saveLocal();
      render();
      $('saveMsg').textContent = 'Reset done';
    };

    $('addPhoto').onclick = () => {
      data.photos = data.photos || [];
      data.photos.push({ url: $('newPhotoUrl').value, caption: $('newPhotoCaption').value });
      saveLocal(); render();
    };
    $('addCert').onclick = () => {
      data.certificates = data.certificates || [];
      data.certificates.push({ name: $('newCertName').value, issuer: $('newCertIssuer').value, url: $('newCertUrl').value });
      saveLocal(); render();
    };
    $('addLink').onclick = () => {
      data.links = data.links || [];
      data.links.push({ label: $('newLinkLabel').value, url: $('newLinkUrl').value });
      saveLocal(); render();
    };

    $('downloadJson').onclick = () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'portfolio-data.json';
      a.click();
      URL.revokeObjectURL(url);
    };

    $('uploadJson').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          data = JSON.parse(r.result);
          saveLocal();
          render();
          $('saveMsg').textContent = 'Imported JSON';
        } catch {
          $('saveMsg').textContent = 'Invalid JSON file';
        }
      };
      r.readAsText(file);
    };

    if (!localStorage.getItem(STORAGE_KEY)) saveLocal();
    showEditorIfLogged();
    render();
  </script>
</body>
</html>
